<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站动态 · 投资观察面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Neo-Trading Terminal — B站动态聚合面板
   ============================================================ */
:root {
  --bg-deep: #0a0c10;
  --bg-card: #13161d;
  --bg-card-hover: #1a1e28;
  --bg-panel: #0f1118;
  --border: #1e2230;
  --border-glow: #2a2e3d;
  --text-primary: #e8e6e3;
  --text-secondary: #8b8d93;
  --text-muted: #5c5e65;
  --accent-pink: #fb7299;
  --accent-pink-glow: #fb729966;
  --accent-cyan: #23d5e8;
  --accent-cyan-glow: #23d5e844;
  --accent-amber: #f5a623;
  --accent-green: #4cdf80;
  --accent-red: #ff5c72;
  --author-1: #fb7299;
  --author-2: #23d5e8;
  --author-3: #f5a623;
  --author-4: #a78bfa;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-display: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Background atmosphere ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(251,114,153,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 85%, rgba(35,213,232,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ---- Noise texture overlay ---- */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 24px 32px; }

/* ============================================================
   HEADER
   ============================================================ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.header-logo {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 24px rgba(251,114,153,0.25);
}
.header-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 0.5px;
}
.header-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ---- Stats strip ---- */
.stats-strip {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
}
.stat-item {
  text-align: right;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ============================================================
   AUTHOR BAR
   ============================================================ */
.author-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.author-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px 8px 8px;
  border-radius: 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.25s ease;
  user-select: none;
  position: relative;
}
.author-chip:hover {
  border-color: var(--border-glow);
  background: var(--bg-card-hover);
  transform: translateY(-1px);
}
.author-chip.active {
  border-color: var(--chip-color, var(--accent-pink));
  box-shadow: 0 0 16px var(--chip-glow, transparent);
}
.author-chip .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid transparent;
  transition: border-color 0.25s;
}
.author-chip.active .avatar { border-color: var(--chip-color, var(--accent-pink)); }
.author-chip .info { display: flex; flex-direction: column; }
.author-chip .name { font-size: 13px; font-weight: 600; line-height: 1.2; }
.author-chip .count { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.author-chip .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--chip-color);
  position: absolute;
  top: 6px; right: 10px;
  box-shadow: 0 0 8px var(--chip-glow);
}

/* ---- Type filter ---- */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  align-items: center;
}
.filter-row .label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-right: 8px;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-glow); color: var(--text-primary); }
.filter-btn.active {
  background: var(--bg-card);
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
}

/* ============================================================
   TIMELINE
   ============================================================ */
.timeline {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 860px) { .timeline { grid-template-columns: 1fr; } }

/* ---- Card ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 22px;
  transition: all 0.3s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.5s ease both;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card:hover {
  border-color: var(--border-glow);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--card-accent, var(--accent-pink));
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover::before { opacity: 1; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Card header */
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.card-author {
  font-size: 13px;
  font-weight: 600;
  color: var(--card-accent, var(--text-primary));
}
.card-time {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-left: auto;
}
.card-type-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.badge-video {
  background: rgba(245,166,35,0.15);
  color: var(--accent-amber);
  border: 1px solid rgba(245,166,35,0.3);
}
.badge-opus {
  background: rgba(35,213,232,0.12);
  color: var(--accent-cyan);
  border: 1px solid rgba(35,213,232,0.25);
}

/* Card body */
.card-body {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 6;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-word;
}
.card-body.expanded {
  -webkit-line-clamp: unset;
  display: block;
}
.card-expand {
  font-size: 11px;
  color: var(--accent-cyan);
  cursor: pointer;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  align-self: flex-start;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.card-expand:hover { opacity: 1; }

/* Card footer */
.card-footer {
  display: flex;
  gap: 18px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11.5px;
}
.stat-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--text-muted);
}
.stat-badge .val { color: var(--text-secondary); font-weight: 500; }
.stat-badge.like .val { color: var(--accent-pink); }
.stat-badge.comment .val { color: var(--accent-cyan); }
.stat-badge.forward .val { color: var(--accent-green); }

/* Card video link */
.card-video-link {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--accent-amber);
  text-decoration: none;
  font-family: var(--font-mono);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  background: rgba(245,166,35,0.08);
  border: 1px solid rgba(245,166,35,0.2);
  transition: all 0.2s;
  width: fit-content;
}
.card-video-link:hover {
  background: rgba(245,166,35,0.15);
  border-color: rgba(245,166,35,0.4);
}
.card-video-link .play-count {
  color: var(--text-muted);
  margin-left: auto;
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state .msg { font-size: 15px; font-family: var(--font-display); }

/* ============================================================
   LOADING
   ============================================================ */
.skeleton {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 22px;
  height: 180px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">📊</div>
      <div>
        <div class="header-title">投资观察面板</div>
        <div class="header-subtitle">Bilibili Dynamics · Multi-Author Feed</div>
      </div>
    </div>
    <div class="stats-strip" id="statsStrip"></div>
  </header>

  <!-- Author chips -->
  <div class="author-bar" id="authorBar"></div>

  <!-- Filters -->
  <div class="filter-row">
    <span class="label">筛选</span>
    <button class="filter-btn active" data-type="all">全部</button>
    <button class="filter-btn" data-type="opus">📝 图文</button>
    <button class="filter-btn" data-type="video">🎬 视频</button>
  </div>

  <!-- Timeline grid -->
  <div class="timeline" id="timeline"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
</script>
<script src="out/timeline.js"></script>
<script>
var TIMELINE_DATA = window.TIMELINE_DATA || [];

// ============================================================
// STATE
// ============================================================
let activeAuthor = null;  // null = all
let activeType = 'all';   // 'all' | 'opus' | 'video'

// ============================================================
// DERIVED DATA
// ============================================================
const authorsMap = {};
TIMELINE_DATA.forEach(item => {
  const uid = item._uid;
  if (!authorsMap[uid]) {
    authorsMap[uid] = {
      uid,
      name: item.author.name,
      face: item.author.face,
      count: 0,
      totalLikes: 0,
      color: '',
      glow: '',
    };
  }
  authorsMap[uid].count++;
  authorsMap[uid].totalLikes += item.stats.like;
});

const COLORS = [
  { color: '#fb7299', glow: 'rgba(251,114,153,0.35)' },
  { color: '#23d5e8', glow: 'rgba(35,213,232,0.35)' },
  { color: '#f5a623', glow: 'rgba(245,166,35,0.35)' },
  { color: '#a78bfa', glow: 'rgba(167,139,250,0.35)' },
];
const authorList = Object.values(authorsMap);
authorList.forEach((a, i) => {
  a.color = COLORS[i].color;
  a.glow = COLORS[i].glow;
});

const totalDynamics = TIMELINE_DATA.length;
const totalLikes = TIMELINE_DATA.reduce((s, i) => s + i.stats.like, 0);
const totalComments = TIMELINE_DATA.reduce((s, i) => s + i.stats.comment, 0);

// ============================================================
// RENDER: Stats strip
// ============================================================
function renderStats() {
  document.getElementById('statsStrip').innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${totalDynamics}</div>
      <div class="stat-label">Total Posts</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${authorList.length}</div>
      <div class="stat-label">Authors</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${(totalLikes / 1000).toFixed(1)}k</div>
      <div class="stat-label">Total Likes</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${(totalComments / 1000).toFixed(1)}k</div>
      <div class="stat-label">Comments</div>
    </div>
  `;
}

// ============================================================
// RENDER: Author bar
// ============================================================
function renderAuthorBar() {
  const bar = document.getElementById('authorBar');

  // "All" chip
  const isAllActive = activeAuthor === null;
  bar.innerHTML = `
    <div class="author-chip ${isAllActive ? 'active' : ''}"
         style="--chip-color: #fff; --chip-glow: rgba(255,255,255,0.25)"
         data-uid="">
      <div class="avatar" style="background:var(--bg-panel);display:flex;align-items:center;justify-content:center;font-size:16px;">👥</div>
      <div class="info">
        <span class="name">全部博主</span>
        <span class="count">${totalDynamics} 条</span>
      </div>
      ${isAllActive ? '<div class="dot" style="--chip-color:#fff;--chip-glow:rgba(255,255,255,0.4)"></div>' : ''}
    </div>
  `;

  // Individual author chips
  authorList.forEach(a => {
    const active = activeAuthor === a.uid;
    bar.innerHTML += `
      <div class="author-chip ${active ? 'active' : ''}"
           style="--chip-color: ${a.color}; --chip-glow: ${a.glow}"
           data-uid="${a.uid}">
        <img class="avatar" src="${a.face}" alt="${a.name}" loading="lazy"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%2313161d%22 width=%2240%22 height=%2240%22 rx=%2220%22/><text fill=%22%238b8d93%22 x=%2220%22 y=%2226%22 text-anchor=%22middle%22 font-size=%2216%22>${a.name[0]}</text></svg>'">
        <div class="info">
          <span class="name">${a.name}</span>
          <span class="count">${a.count} 条 · 👍 ${a.totalLikes}</span>
        </div>
        ${active ? `<div class="dot" style="--chip-color:${a.color};--chip-glow:${a.glow}"></div>` : ''}
      </div>
    `;
  });

  // Click handlers
  bar.querySelectorAll('.author-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const uid = chip.dataset.uid;
      activeAuthor = uid ? parseInt(uid) : null;
      renderAuthorBar();
      renderTimeline();
    });
  });
}

// ============================================================
// RENDER: Timeline
// ============================================================
function renderTimeline() {
  const container = document.getElementById('timeline');
  const filtered = TIMELINE_DATA.filter(item => {
    if (activeAuthor !== null && item._uid !== activeAuthor) return false;
    if (activeType !== 'all' && item.content.type !== activeType) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <div class="msg">没有匹配的动态</div>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((item, i) => {
    const author = authorsMap[item._uid];
    const accent = author ? author.color : '#fb7299';
    const typeLabel = item.content.type === 'video' ? '视频' : '图文';
    const badgeClass = item.content.type === 'video' ? 'badge-video' : 'badge-opus';

    // Body text
    let bodyText = '';
    if (item.content.type === 'video') {
      bodyText = item.content.title || item.text || '';
    } else {
      bodyText = item.content.summary_text || item.text || '';
    }
    const isLong = bodyText.length > 200;
    const bodyId = `body-${i}`;

    // Video link
    let videoLink = '';
    if (item.content.type === 'video' && item.content.bvid) {
      videoLink = `
        <a class="card-video-link" href="https://www.bilibili.com/video/${item.content.bvid}" target="_blank" rel="noopener">
          ▶ BV${item.content.bvid}
          ${item.content.play ? `<span class="play-count">▶ ${item.content.play}</span>` : ''}
          ${item.content.duration ? `<span>${item.content.duration}</span>` : ''}
        </a>`;
    }

    // Opus link
    let opusLink = '';
    if (item.content.type === 'opus' && item.id_str) {
      opusLink = `
        <a class="card-video-link" style="border-color:rgba(35,213,232,0.2);background:rgba(35,213,232,0.06);color:var(--accent-cyan)"
           href="https://www.bilibili.com/opus/${item.id_str}" target="_blank" rel="noopener">
          🔗 查看原文
        </a>`;
    }

    // Expand button for long text
    const expandBtn = isLong
      ? `<span class="card-expand" onclick="toggleBody('${bodyId}', this)">展开全文 ↓</span>`
      : '';

    return `
      <div class="card" style="--card-accent: ${accent}; animation-delay: ${Math.min(i * 0.02, 0.5)}s">
        <div class="card-header">
          <img class="card-avatar" src="${item.author.face}" alt="${item.author.name}" loading="lazy"
               onerror="this.style.display='none'">
          <span class="card-author">${item.author.name}</span>
          <span class="card-type-badge ${badgeClass}">${typeLabel}</span>
          <span class="card-time">${item.pub_time}</span>
        </div>
        <div class="card-body" id="${bodyId}">${escapeHtml(bodyText)}</div>
        ${expandBtn}
        ${videoLink}
        ${opusLink}
        <div class="card-footer">
          <span class="stat-badge like">❤ <span class="val">${item.stats.like}</span></span>
          <span class="stat-badge comment">💬 <span class="val">${item.stats.comment}</span></span>
          <span class="stat-badge forward">🔄 <span class="val">${item.stats.forward}</span></span>
        </div>
      </div>`;
  }).join('');
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toggleBody(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '收起 ↑' : '展开全文 ↓';
}

// ============================================================
// FILTER BUTTONS
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderTimeline();
  });
});

// ============================================================
// INIT
// ============================================================
renderStats();
renderAuthorBar();
renderTimeline();
</script>
</body>
</html>
