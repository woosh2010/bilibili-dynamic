<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站动态面板</title>
<style>
:root{
  --bg:#0a0c10; --bg2:#13161d; --bg2h:#1a1e28; --border:#1e2230; --border2:#2a2e3d;
  --tx:#e8e6e3; --tx2:#8b8d93; --tx3:#5c5e65;
  --pink:#fb7299; --cyan:#23d5e8; --amber:#f5a623; --green:#4cdf80; --red:#ff5c72;
  --panel:rgba(19,22,29,.65); --r:6px; --r2:8px;
}
:root[data-theme="light"]{
  --bg:#f5f7fb; --bg2:#ffffff; --bg2h:#eef3f8; --border:#d9e1ea; --border2:#b6c4d2;
  --tx:#172033; --tx2:#4f5d70; --tx3:#7c8797; --panel:rgba(255,255,255,.78);
}
:root[data-theme="mono"]{
  --bg:#ffffff; --bg2:#ffffff; --bg2h:#f2f2f2; --border:#d5d5d5; --border2:#000000;
  --tx:#000000; --tx2:#2f2f2f; --tx3:#666666;
  --pink:#000000; --cyan:#000000; --amber:#000000; --panel:rgba(255,255,255,.92);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--tx); font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  font-size:14px; line-height:1.5; min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(251,114,153,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 85%, rgba(35,213,232,0.03) 0%, transparent 60%);
}
.app{max-width:1100px;margin:0 auto;padding:24px 28px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header-l{display:flex;align-items:center;gap:12px;min-width:240px}
.header-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--pink),var(--cyan));border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(251,114,153,0.2)}
.header-sub{font-size:11px;color:var(--tx3);font-family:"SF Mono","JetBrains Mono",monospace;letter-spacing:0}
.header-tools{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:flex-end}
.theme-toggle{display:flex;align-items:center;gap:2px;padding:3px;border:1px solid var(--border);border-radius:999px;background:var(--bg2)}
.theme-btn{border:0;background:transparent;color:var(--tx3);padding:5px 11px;border-radius:999px;cursor:pointer;font-size:11px;font-weight:700;font-family:"SF Mono","JetBrains Mono",monospace}
.theme-btn:hover{color:var(--tx)}
.theme-btn.on{background:var(--bg2h);color:var(--tx);box-shadow:inset 0 0 0 1px var(--border2)}
.stats{display:flex;gap:24px;flex-wrap:wrap;justify-content:flex-end}
.stats-i{text-align:right}
.stats-v{font-size:21px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:"SF Mono","JetBrains Mono",monospace}
.stats-l{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:0}
.author-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.author-chip{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 6px;border-radius:40px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s;user-select:none;font-size:12.5px}
.author-chip:hover{border-color:var(--border2);background:var(--bg2h)}
.author-chip.on{border-color:var(--c);box-shadow:0 0 12px var(--g)}
.author-chip .av{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid transparent;transition:border-color .2s}
.author-chip.on .av{border-color:var(--c)}
.author-status{width:8px;height:8px;border-radius:50%;background:var(--tx3);box-shadow:0 0 7px rgba(139,141,147,.22);flex:0 0 auto}
.author-status.ok{background:var(--green);box-shadow:0 0 8px rgba(76,223,128,.38)}
.author-status.fail{background:var(--red);box-shadow:0 0 8px rgba(255,92,114,.38)}
.author-chip .n{font-weight:600}
.author-chip .ct{font-size:10.5px;color:var(--tx3);font-family:"SF Mono","JetBrains Mono",monospace}
.mode-notice{margin-bottom:14px;padding:10px 12px;border:1px solid rgba(245,166,35,.35);border-radius:var(--r2);background:rgba(245,166,35,.08);color:var(--tx2);font-size:12px;line-height:1.6}
.mode-notice a{color:var(--amber);text-decoration:none;font-family:"SF Mono","JetBrains Mono",monospace}
.mode-notice a:hover{text-decoration:underline}
.filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.filter-row .lbl{font-size:11px;color:var(--tx3);font-family:"SF Mono","JetBrains Mono",monospace;letter-spacing:0;margin-right:6px}
.fbtn{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;transition:all .2s}
.fbtn:hover{border-color:var(--border2);color:var(--tx)}
.fbtn.on{background:var(--bg2);border-color:var(--cyan);color:var(--cyan)}
.table{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.row{display:grid;grid-template-columns:52px 1fr 82px;gap:12px;align-items:center;padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--border);transition:background .15s;position:relative;min-height:56px}
.row:last-child{border-bottom:none}
.row:hover{background:var(--bg2h)}
.row::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--c)}
.row-av{width:28px;height:28px;border-radius:50%;object-fit:cover;margin:0 auto;display:block}
.row-time{font-size:10px;color:var(--tx3);font-family:"SF Mono","JetBrains Mono",monospace;text-align:center;margin-top:3px}
.row-body{min-width:0}
.row-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.row-author{font-size:12.5px;font-weight:600;color:var(--c)}
.row-badge{font-size:9.5px;padding:1px 7px;border-radius:10px;font-family:"SF Mono","JetBrains Mono",monospace;letter-spacing:0}
.badge-v{background:rgba(245,166,35,0.12);color:var(--amber);border:1px solid rgba(245,166,35,0.25)}
.badge-o{background:rgba(35,213,232,0.1);color:var(--cyan);border:1px solid rgba(35,213,232,0.2)}
.row-txt{font-size:12.5px;line-height:1.55;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.row-txt.exp{-webkit-line-clamp:unset;display:block}
.row-expand{font-size:10.5px;color:var(--cyan);cursor:pointer;font-family:"SF Mono","JetBrains Mono",monospace;opacity:.6;user-select:none}
.row-expand:hover{opacity:1}
.row-link{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;text-decoration:none;font-family:"SF Mono","JetBrains Mono",monospace;padding:3px 8px;border-radius:var(--r);width:fit-content;white-space:nowrap}
.row-link.v{color:var(--amber);background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2)}
.row-link.o{color:var(--cyan);background:rgba(35,213,232,0.06);border:1px solid rgba(35,213,232,0.2)}
.row-link:hover.v{background:rgba(245,166,35,0.15)}
.row-link:hover.o{background:rgba(35,213,232,0.12)}
.row-stats{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.row-stat{display:flex;align-items:center;gap:3px;font-size:10.5px;font-family:"SF Mono","JetBrains Mono",monospace;color:var(--tx3)}
.row-stat .s{font-weight:600}
.row-stat.l .s{color:var(--pink)}
.row-stat.c .s{color:var(--cyan)}
.row-stat.f .s{color:var(--green)}
:root[data-theme="mono"] body{background-image:none}
:root[data-theme="mono"] .header-logo{background:#000;color:#fff;box-shadow:none}
:root[data-theme="mono"] .stats-v{background:none;-webkit-text-fill-color:var(--tx);color:var(--tx)}
:root[data-theme="mono"] .author-chip.on{border-color:#000;box-shadow:0 0 0 1px #000}
:root[data-theme="mono"] .author-chip.on .av{border-color:#000}
:root[data-theme="mono"] .row::before{background:#000}
:root[data-theme="mono"] .row-author{color:#000}
:root[data-theme="mono"] .fbtn.on{border-color:#000;color:#000}
:root[data-theme="mono"] .row-badge,
:root[data-theme="mono"] .row-link{border-color:#000;background:#fff;color:#000}
:root[data-theme="mono"] .row-link:hover.v,
:root[data-theme="mono"] .row-link:hover.o{background:#f2f2f2}
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty .icon{font-size:40px;margin-bottom:10px}
@media(max-width:700px){
  .app{padding:18px 14px}
  .header{align-items:flex-start}
  .header-tools{justify-content:flex-start}
  .stats{gap:12px;justify-content:flex-start}
  .stats-v{font-size:17px}
  .row{grid-template-columns:40px 1fr 62px;gap:8px;padding:8px 10px}
}
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="header-l">
    <div class="header-logo">📊</div>
    <div>
      <div class="header-sub" id="updateStatus">加载中</div>
    </div>
  </div>
  <div class="header-tools">
    <div class="theme-toggle" role="group" aria-label="主题颜色">
      <button class="theme-btn" type="button" data-theme-option="dark">Dark</button>
      <button class="theme-btn" type="button" data-theme-option="light">Light</button>
      <button class="theme-btn" type="button" data-theme-option="mono">B/W</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</header>

<div class="author-bar" id="authorBar"></div>
<div class="mode-notice" id="modeNotice" hidden></div>
<div class="filter-row">
  <span class="lbl">筛选</span>
  <button class="fbtn on" data-type="all">全部</button>
  <button class="fbtn" data-type="opus">📝 图文</button>
  <button class="fbtn" data-type="video">🎬 视频</button>
</div>
<div class="table" id="timeline"></div>
</div>

<script src="out/timeline.js"></script>
<script>
var DATA = window.TIMELINE_DATA || [];
var META = window.TIMELINE_META || {};
var REFRESH_STATUS = META.refresh_status || {};
var COLORS = [
  ["#fb7299", "rgba(251,114,153,0.35)"],
  ["#23d5e8", "rgba(35,213,232,0.35)"],
  ["#f5a623", "rgba(245,166,35,0.35)"],
  ["#a78bfa", "rgba(167,139,250,0.35)"],
  ["#4cdf80", "rgba(76,223,128,0.35)"],
  ["#ff5c72", "rgba(255,92,114,0.35)"],
  ["#58a6ff", "rgba(88,166,255,0.35)"]
];
var activeAuthor = null;
var activeType = 'all';
var seenApiUpdatedAt = null;
var IS_FILE_MODE = window.location.protocol === 'file:';
var FILE_MODE_RELOAD_INTERVAL = 60000;
var THEME_KEY = 'bili-dashboard-theme';

function storedTheme(){
  try {
    var theme = localStorage.getItem(THEME_KEY) || 'dark';
    return ['dark', 'light', 'mono'].indexOf(theme) >= 0 ? theme : 'dark';
  } catch(e) {
    return 'dark';
  }
}

function applyTheme(theme){
  theme = ['dark', 'light', 'mono'].indexOf(theme) >= 0 ? theme : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  try {
    localStorage.setItem(THEME_KEY, theme);
  } catch(e) {}
  document.querySelectorAll('.theme-btn').forEach(function(btn){
    btn.classList.toggle('on', btn.dataset.themeOption === theme);
  });
}

function buildAuthors(){
  var map = {};
  DATA.forEach(function(item){
    var uid = String(item._uid || (item.author && item.author.mid) || '');
    if(!uid) return;
    if(!map[uid]){
      map[uid] = {uid:uid, name:item.author.name || uid, face:item.author.face || '', count:0, likes:0, comments:0};
    }
    map[uid].count += 1;
    map[uid].likes += Number((item.stats || {}).like || 0);
    map[uid].comments += Number((item.stats || {}).comment || 0);
  });
  Object.keys(REFRESH_STATUS).forEach(function(uid){
    var s = REFRESH_STATUS[uid] || {};
    if(!map[uid]){
      map[uid] = {uid:uid, name:s.name || uid, face:'', count:0, likes:0, comments:0};
    } else if(s.name){
      map[uid].name = s.name;
    }
    map[uid].refresh = s;
  });
  return Object.keys(map).map(function(uid, i){
    var a = map[uid], c = COLORS[i % COLORS.length];
    a.color = c[0]; a.glow = c[1];
    return a;
  });
}

var AUTHORS = buildAuthors();

function fmt(n){
  n = Number(n || 0);
  if(n >= 10000) return (n / 10000).toFixed(n >= 100000 ? 0 : 1) + 'w';
  if(n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
  return String(n);
}

function escapeHtml(s){
  var d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function renderHeader(){
  var likes = DATA.reduce(function(sum, item){ return sum + Number((item.stats || {}).like || 0); }, 0);
  var comments = DATA.reduce(function(sum, item){ return sum + Number((item.stats || {}).comment || 0); }, 0);
  document.getElementById('updateStatus').textContent =
    DATA.length + ' 条动态 · ' + AUTHORS.length + ' 位博主' + (META.generated_at ? ' · 数据 ' + META.generated_at : '');
  document.getElementById('stats').innerHTML = [
    ['Posts', fmt(DATA.length)],
    ['Authors', fmt(AUTHORS.length)],
    ['Likes', fmt(likes)],
    ['Comments', fmt(comments)]
  ].map(function(x){
    return '<div class="stats-i"><div class="stats-v">'+x[1]+'</div><div class="stats-l">'+x[0]+'</div></div>';
  }).join('');
}

function renderAuthorBar(){
  var bar = document.getElementById('authorBar');
  var allTitle = '全部\n动态：' + DATA.length + ' 条';
  var html = '<div class="author-chip' + (activeAuthor===null?' on':'') + '" style="--c:#fff;--g:rgba(255,255,255,0.2)" data-uid="" title="'+escapeHtml(allTitle)+'"><span class="av" style="background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px">👥</span><span class="n">全部</span><span class="ct">'+DATA.length+' 条</span></div>';
  AUTHORS.forEach(function(a){
    var on = activeAuthor === a.uid;
    var s = a.refresh || REFRESH_STATUS[a.uid] || {};
    var hasStatus = Object.prototype.hasOwnProperty.call(s, 'ok');
    var statusClass = hasStatus ? (s.ok ? ' ok' : ' fail') : '';
    var refreshCount = s.count == null ? a.count : s.count;
    var title = a.name + '\n刷新时间：' + (s.last_refresh_at || '-') + '\n本次条数：' + refreshCount + ' 条';
    if(s.error) title += '\n错误：' + s.error;
    var face = a.face ? '<img class="av" src="'+a.face+'" onerror="this.style.display=\'none\'">' : '<span class="av" style="background:'+a.color+'22;display:flex;align-items:center;justify-content:center">'+escapeHtml((a.name || '?').slice(0,1))+'</span>';
    html += '<div class="author-chip'+(on?' on':'')+'" style="--c:'+a.color+';--g:'+a.glow+'" data-uid="'+a.uid+'" title="'+escapeHtml(title)+'">'+face+'<span class="author-status'+statusClass+'"></span><span class="n">'+escapeHtml(a.name)+'</span><span class="ct">'+a.count+' 条</span></div>';
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.author-chip').forEach(function(c){
    c.onclick = function(){
      activeAuthor = c.dataset.uid || null;
      renderAuthorBar();
      renderTimeline();
    };
  });
}

function renderModeNotice(){
  var notice = document.getElementById('modeNotice');
  if(!notice || !IS_FILE_MODE) return;
  notice.hidden = false;
  notice.innerHTML = '当前是本地文件模式，只能读取磁盘上已有的数据文件，不能自己启动后台拉取。请使用 <a href="http://localhost:8084/dashboard.html">http://localhost:8084/dashboard.html</a>；如果启动面板正在运行，本页也会每 60 秒自动重载一次读取新文件。';
}

function renderTimeline(){
  var container = document.getElementById('timeline');
  var authorByUid = {};
  AUTHORS.forEach(function(a){ authorByUid[a.uid] = a; });
  var filtered = DATA.filter(function(item){
    if(activeAuthor !== null && String(item._uid) !== activeAuthor) return false;
    if(activeType !== 'all' && item.content.type !== activeType) return false;
    return true;
  });
  if(!filtered.length){
    container.innerHTML = '<div class="empty"><div class="icon">📭</div>无匹配动态</div>';
    return;
  }
  container.innerHTML = filtered.map(function(item, i){
    var a = authorByUid[String(item._uid)] || {};
    var accent = a.color || '#fb7299';
    var isVideo = item.content.type === 'video';
    var typeLabel = isVideo ? '🎬' : '📝';
    var badgeClass = isVideo ? 'badge-v' : 'badge-o';
    var bodyText = isVideo ? (item.content.title || item.text || '') : (item.content.summary_text || item.text || '');
    var isLong = bodyText.length > 80;
    var bid = 'b'+i;
    var extLink = '';
    if(isVideo && item.content.bvid){
      extLink = '<a class="row-link v" href="https://www.bilibili.com/video/'+item.content.bvid+'" target="_blank" rel="noopener">▶ '+escapeHtml(item.content.play || '观看')+(item.content.duration?' · '+escapeHtml(item.content.duration):'')+'</a>';
    } else if(!isVideo && item.id_str){
      extLink = '<a class="row-link o" href="https://www.bilibili.com/opus/'+item.id_str+'" target="_blank" rel="noopener">🔗 原文</a>';
    }
    var expandBtn = isLong ? '<span class="row-expand" onclick="var e=document.getElementById(\''+bid+'\');var t=e.classList.toggle(\'exp\');this.textContent=t?\'收起 ↑\':\'展开 ↓\'">展开 ↓</span>' : '';
    return '<div class="row" style="--c:'+accent+'"><div style="text-align:center"><img class="row-av" src="'+item.author.face+'" onerror="this.style.display=\'none\'"><div class="row-time">'+escapeHtml(item.pub_time)+'</div></div><div class="row-body"><div class="row-meta"><span class="row-author">'+escapeHtml(item.author.name)+'</span><span class="row-badge '+badgeClass+'">'+typeLabel+'</span>'+extLink+'</div><div class="row-txt" id="'+bid+'">'+escapeHtml(bodyText)+'</div>'+expandBtn+'</div><div class="row-stats"><span class="row-stat l">❤ <span class="s">'+escapeHtml(item.stats.like)+'</span></span><span class="row-stat c">💬 <span class="s">'+escapeHtml(item.stats.comment)+'</span></span><span class="row-stat f">🔄 <span class="s">'+escapeHtml(item.stats.forward)+'</span></span></div></div>';
  }).join('');
}

document.querySelectorAll('.fbtn').forEach(function(b){
  b.onclick = function(){
    document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('on')});
    b.classList.add('on');
    activeType = b.dataset.type;
    renderTimeline();
  };
});

document.querySelectorAll('.theme-btn').forEach(function(btn){
  btn.onclick = function(){
    applyTheme(btn.dataset.themeOption);
  };
});

function pollTimelineStatus(){
  if(IS_FILE_MODE) return;
  fetch('/api/timeline').then(function(r){return r.json()}).then(function(d){
    if(seenApiUpdatedAt === null){
      seenApiUpdatedAt = d.updated_at || '';
      return;
    }
    if((d.count && d.count !== DATA.length) || (d.updated_at && d.updated_at !== seenApiUpdatedAt)){
      location.reload();
    }
  }).catch(function(){});
}

applyTheme(storedTheme());
renderHeader();
renderAuthorBar();
renderModeNotice();
renderTimeline();
if(IS_FILE_MODE){
  setInterval(function(){ location.reload(); }, FILE_MODE_RELOAD_INTERVAL);
} else {
  setTimeout(pollTimelineStatus, 1000);
  setInterval(pollTimelineStatus, 30000);
}
</script>
</body>
</html>
