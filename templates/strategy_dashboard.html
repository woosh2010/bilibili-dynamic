<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站博主荐股策略看板</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;
    --up:#f85149;--down:#3fb950;--gold:#d29922;--blue:#58a6ff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;padding:16px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .topbar h1{font-size:18px;color:#fff}
  .topbar .meta{color:var(--muted);font-size:12px}
  button{background:var(--panel);color:var(--text);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--blue)}
  button.primary{background:#1f6f3f;color:#fff;border-color:#2ea043}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
  .stat .val{font-size:18px;font-weight:600;color:#fff}.stat .lbl{font-size:10px;color:var(--muted);margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  th{color:var(--muted);font-weight:500;font-size:11px;position:sticky;top:0;background:var(--panel);z-index:1}
  th.sortable{cursor:pointer}th.sortable:hover{color:#fff}
  td .tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px}
  .tag-buy{background:#3a1a1a;color:var(--up)}.tag-sell{background:#1a3a2a;color:var(--down)}
  .tag-hold{background:#2a2a1a;color:var(--gold)}.tag-watch{background:#1a2a3a;color:var(--blue)}
  .up{color:var(--up)}.down{color:var(--down)}
  input[type=text],select{background:#0d1117;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px}
  .up-name{font-weight:600;color:var(--gold);max-width:100px;overflow:hidden;text-overflow:ellipsis;display:inline-block}
  .link{color:var(--blue);text-decoration:none;font-size:11px}.link:hover{text-decoration:underline}
  #log{font-size:11px;color:var(--muted);margin-top:10px;max-height:120px;overflow:auto;background:#0d1117;padding:8px;border-radius:6px;font-family:monospace}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>📋 B站博主荐股策略看板</h1>
  </div>
  <div class="meta">
    <span id="updateTime">加载中…</span>
    <button class="primary" onclick="runAnalysis()" style="margin-left:10px">🔄 分析最新动态</button>
    <button onclick="location.reload()" style="margin-left:6px">刷新看板</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="panel" style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div>
      <select id="filterUP" onchange="render()"><option value="">全部博主</option></select>
      <select id="filterAction" onchange="render()" style="margin-left:6px">
        <option value="">全部操作</option><option value="买入">买入</option><option value="卖出">卖出</option>
        <option value="持有">持有</option><option value="关注">关注</option>
      </select>
    </div>
    <input type="text" id="search" placeholder="搜索股票/代码" oninput="render()">
  </div>
  <div style="max-height:65vh;overflow:auto">
    <table>
      <thead><tr>
        <th>博主</th><th>日期</th><th>股票</th><th>代码</th><th>操作</th>
        <th>入场价</th><th>止损</th><th>目标</th><th>时间</th><th>现价</th><th>收益</th><th>理由</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div id="log"></div>

<script>
let PICKS = [];
let QUOTES = {};

function actionTag(a){
  const cls = {'买入':'tag-buy','卖出':'tag-sell','持有':'tag-hold','关注':'tag-watch'};
  return `<span class="tag ${cls[a]||''}">${a}</span>`;
}
function fmt(v,d=2){ if(v==null||isNaN(v)||v==='') return '-'; return Number(v).toFixed(d); }
function color(v){ if(v==null||isNaN(v)) return ''; return v>=0?'up':'down'; }
function fmtTs(ts, fallback){
  // Unix 秒级时间戳 → 精确本地时间; 旧数据无 ts 则回退显示 B站原文
  if(!ts || isNaN(ts)) return fallback||'-';
  const d = new Date(ts * 1000);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function loadUPFilter(){
  const ups = [...new Set(PICKS.map(p=>p.up_name).filter(Boolean))];
  const sel = document.getElementById('filterUP');
  ups.forEach(u=>{ const o = document.createElement('option'); o.value=u; o.textContent=u; sel.appendChild(o); });
}

function renderStats(){
  const total = PICKS.length;
  const upCount = new Set(PICKS.map(p=>p.up_uid)).size;
  const stockSet = new Set();
  PICKS.forEach(p=>{ (p.stocks||[]).forEach(s=>{ if(s.code) stockSet.add(s.code); }); });
  const buyCount = PICKS.reduce((a,p)=>a+(p.stocks||[]).filter(s=>s.action==='买入').length,0);
  const sectorSet = new Set();
  PICKS.forEach(p=>{ (p.sectors||[]).forEach(s=>{ if(s) sectorSet.add(s); }); });
  document.getElementById('stats').innerHTML = [
    ['🐘 监控博主', upCount], ['📈 荐股策略', total],
    ['🎯 推荐股票', stockSet.size], ['🚀 买入信号', buyCount],
    ['💡 涉及题材', sectorSet.size]
  ].map(c=>`<div class="stat"><div class="val">${c[1]}</div><div class="lbl">${c[0]}</div></div>`).join('');
}

function render(){
  const upF = document.getElementById('filterUP').value;
  const aF = document.getElementById('filterAction').value;
  const q = document.getElementById('search').value.trim().toUpperCase();
  let rows = '';
  PICKS.forEach(p=>{
    if(upF && p.up_name!==upF) return;
    const dyn = `https://www.bilibili.com/opus/${p.dynamic_id}`;
    const timeStr = fmtTs(p.dynamic_ts, p.dynamic_time);  // 优先精确时间，回退原文
    const stocks = p.stocks||[];
    const sectors = (p.sectors||[]).filter(Boolean);
    if(stocks.length === 0){
      // 无具体股票，显示题材+总结
      if(aF) return;  // 操作筛选时不显示无股票行
      if(q && !(p.summary||'').toUpperCase().includes(q) && !sectors.join('/').toUpperCase().includes(q)) return;
      rows += `<tr>
        <td><span class="up-name" title="${p.up_name}">${p.up_name}</span></td>
        <td><span title="${p.dynamic_time||''}" style="font-family:monospace;font-size:11px">${timeStr}</span></td>
        <td colspan="4" style="color:var(--muted)">${sectors.length?'🏷️ '+sectors.join('/'):'💬 '+((p.summary||'').substring(0,30))}</td>
        <td colspan="4"></td>
        <td colspan="2" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;color:var(--muted)" title="${p.summary||''}">${(p.summary||'').substring(0,40)}</td>
        <td><a class="link" href="${dyn}" target="_blank">原文</a></td>
      </tr>`;
      return;
    }
    stocks.forEach(s=>{
      if(aF && s.action!==aF) return;
      if(q && !(s.name||'').includes(q) && !(s.code||'').includes(q)) return;
      const qp = QUOTES[s.code]||{};
      const price = qp.price || null;
      const ret = (price && s.entry_price) ? (price/s.entry_price-1)*100 : null;
      rows += `<tr>
        <td><span class="up-name" title="${p.up_name}">${p.up_name}</span></td>
        <td><span title="${p.dynamic_time||''}" style="font-family:monospace;font-size:11px">${timeStr}</span></td>
        <td>${s.name||''}</td><td>${s.code||''}</td>
        <td>${actionTag(s.action)}</td>
        <td>${fmt(s.entry_price)}</td><td>${fmt(s.stop_loss,0)}</td><td>${fmt(s.target,0)}</td>
        <td>${s.timeframe||''}</td>
        <td>${fmt(price,2)}</td>
        <td class="${color(ret)}">${ret!=null?(ret>=0?'+':'')+ret.toFixed(1)+'%':'-'}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${s.reasoning||''}">${(s.reasoning||'').substring(0,40)}</td>
        <td><a class="link" href="${dyn}" target="_blank">原文</a></td>
      </tr>`;
    });
  });
  document.getElementById('tbody').innerHTML = rows || '<tr><td colspan="13" style="text-align:center;color:var(--muted);padding:30px">暂无策略数据，点击「分析最新动态」开始</td></tr>';
}

function loadData(){
  fetch('/api/picks').then(r=>r.json()).then(d=>{
    PICKS = d.picks||[];
    document.getElementById('updateTime').textContent = '更新: ' + (d.analyzed_at||'');
    flattenPick(); loadUPFilter(); renderStats(); render();
  });
}

// 扁平化 picks 收集所有股票代码用于行情
function flattenPick(){
  const codes = [];
  PICKS.forEach(p=>{ (p.stocks||[]).forEach(s=>{ if(s.code) codes.push(s.code); }); });
  return [...new Set(codes)];
}
function pollQuotes(){
  const codes = flattenPick();
  if(!codes.length) return;
  fetch('/api/quotes?codes='+codes.slice(0,200).join(',')).then(r=>r.json()).then(d=>{
    QUOTES = d.quotes||{}; render();
  });
}
function runAnalysis(){
  const log = document.getElementById('log');
  log.innerHTML = '⏳ 正在分析最新动态...';
  fetch('/api/analyze',{method:'POST'}).then(r=>r.json()).then(d=>{
    log.innerHTML = '✓ ' + (d.msg||'已启动') + ' 分析完成后自动刷新看板。';
    // 每2秒轮询等待新数据
    let count = 0;
    const iv = setInterval(()=>{
      fetch('/api/picks').then(r=>r.json()).then(nd=>{
        if(nd.picks.length !== PICKS.length || ++count > 30){
          clearInterval(iv);
          location.reload();
        }
        log.innerHTML = '⏳ 分析中... 已识别 ' + nd.picks.length + ' 条策略';
      });
    },2000);
  });
}

loadData();
pollQuotes();
setInterval(pollQuotes, 8000);
</script>
</body>
</html>
